<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Зал ожидания - Телемост</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f0f0f0;
            border-top: 4px solid #764ba2;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 30px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 { color: #333; margin-bottom: 20px; }
        #status { font-size: 16px; color: #666; margin-top: 20px; }
        .approved { color: #27ae60; font-weight: bold; }
        .rejected { color: #e74c3c; font-weight: bold; }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>⏳ Зал ожидания</h2>
        <div class="spinner" id="spinner"></div>
        <p id="status">Ожидание подтверждения от администратора...</p>
        <button id="refreshBtn" style="display: none;" onclick="checkStatus()">🔄 Проверить</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://nqyhimigrauwhaxhrqey.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-7WrHBe71EWCe3xRZvQ__Q_yic5sbW6';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');
        const userId = urlParams.get('userId');

        async function checkStatus() {
            try {
                const { data, error } = await supabase
                    .from('waiting')
                    .select('status')
                    .eq('user_id', userId)
                    .eq('room_id', roomName)
                    .maybeSingle();

                if (error) throw error;

                if (data) {
                    if (data.status === 'approved') {
                        document.getElementById('status').innerHTML = '✅ Доступ разрешен! Перенаправление...';
                        document.getElementById('status').className = 'approved';
                        document.getElementById('spinner').style.display = 'none';
                        setTimeout(() => {
                            window.location.href = `room.html?room=${encodeURIComponent(roomName)}&userId=${encodeURIComponent(userId)}`;
                        }, 1000);
                    } else if (data.status === 'rejected') {
                        document.getElementById('status').innerHTML = '❌ Доступ отклонён администратором';
                        document.getElementById('status').className = 'rejected';
                        document.getElementById('spinner').style.display = 'none';
                        document.getElementById('refreshBtn').style.display = 'inline-block';
                    }
                }

                const { data: room } = await supabase
                    .from('rooms')
                    .select('id')
                    .eq('id', roomName)
                    .maybeSingle();

                if (!room) {
                    document.getElementById('status').innerHTML = '🚪 Комната закрыта администратором';
                    document.getElementById('status').className = 'rejected';
                    document.getElementById('spinner').style.display = 'none';
                }

            } catch (err) {
                console.error('Ошибка проверки:', err);
            }
        }

        setInterval(checkStatus, 2000);
        checkStatus();
    </script>
</body>
</html>
