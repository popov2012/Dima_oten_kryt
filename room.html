<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Телемост - Комната</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 60px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 20px; }
        .video-placeholder {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 60px;
            margin: 30px 0;
            color: white;
            font-size: 18px;
        }
        button {
            padding: 12px 30px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { transform: translateY(-2px); background: #5a3a7a; }
        .room-name {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 14px;
        }
        .warning { color: #e74c3c; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎬 Вы в телемосте!</h1>
        <div class="video-placeholder">
            🎥 Зона видеосвязи<br>
            <small>Здесь будет WebRTC (видео/аудио)</small>
        </div>
        <button onclick="exitRoom()">🚪 Покинуть комнату</button>
        <div class="room-name" id="roomName"></div>
        <div class="warning" id="warning"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://nqyhimigrauwhaxhrqey.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-7WrHBe71EWCe3xRZvQ__Q_yic5sbW6';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const roomName = urlParams.get('room');
        const userId = urlParams.get('userId');

        document.getElementById('roomName').innerHTML = 'Комната: <strong>' + roomName + '</strong>';

        function exitRoom() {
            window.location.href = 'index.html';
        }

        setInterval(async () => {
            const { data: room } = await supabase
                .from('rooms')
                .select('id')
                .eq('id', roomName)
                .maybeSingle();

            if (!room) {
                document.getElementById('warning').innerHTML = '⚠️ Комната закрыта администратором. Через 5 секунд будет выход...';
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 5000);
            }
        }, 5000);
    </script>
</body>
</html>
