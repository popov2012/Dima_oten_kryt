<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Телемост - Вход</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 24px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { margin-bottom: 10px; color: #333; }
        .sub { color: #666; margin-bottom: 30px; font-size: 14px; }
        .btn-group { display: flex; gap: 15px; margin-bottom: 30px; }
        button {
            flex: 1;
            padding: 14px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }
        .create-btn { background: #4CAF50; color: white; }
        .join-btn { background: #2196F3; color: white; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        input:focus { outline: none; border-color: #764ba2; }
        .hidden { display: none; }
        .error { color: #e74c3c; margin-top: 12px; font-size: 14px; }
        .card-title { font-size: 20px; font-weight: 600; margin-bottom: 20px; color: #333; }
        .info { font-size: 12px; color: #999; margin-top: 20px; }
        .loading { color: #666; margin-top: 10px; font-size: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Телемост</h1>
        <div class="sub">Видеосвязь с подтверждением входа</div>

        <div class="btn-group">
            <button class="create-btn" id="showCreateBtn">➕ Создать комнату</button>
            <button class="join-btn" id="showJoinBtn">🔗 Присоединиться</button>
        </div>

        <div id="createForm" class="hidden">
            <div class="card-title">Создать новую комнату</div>
            <input type="text" id="createRoomName" placeholder="Название комнаты">
            <input type="password" id="createPassword" placeholder="Пароль">
            <button class="create-btn" id="createBtn">Создать</button>
            <div id="createError" class="error"></div>
            <div id="createLoading" class="loading"></div>
        </div>

        <div id="joinForm" class="hidden">
            <div class="card-title">Присоединиться к комнате</div>
            <input type="text" id="joinRoomName" placeholder="Название комнаты">
            <input type="password" id="joinPassword" placeholder="Пароль">
            <button class="join-btn" id="joinBtn">Присоединиться</button>
            <div id="joinError" class="error"></div>
            <div id="joinLoading" class="loading"></div>
        </div>

        <div class="info">💡 Комнаты создаются в облаке. Админ подтверждает вход.</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://nqyhimigrauwhaxhrqey.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_-7WrHBe71EWCe3xRZvQ__Q_yic5sbW6';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const createForm = document.getElementById('createForm');
        const joinForm = document.getElementById('joinForm');

        document.getElementById('showCreateBtn').onclick = () => {
            createForm.classList.remove('hidden');
            joinForm.classList.add('hidden');
            document.getElementById('createError').textContent = '';
            document.getElementById('createLoading').textContent = '';
        };

        document.getElementById('showJoinBtn').onclick = () => {
            joinForm.classList.remove('hidden');
            createForm.classList.add('hidden');
            document.getElementById('joinError').textContent = '';
            document.getElementById('joinLoading').textContent = '';
        };

        document.getElementById('createBtn').onclick = async () => {
            const roomName = document.getElementById('createRoomName').value.trim();
            const password = document.getElementById('createPassword').value;
            const errorDiv = document.getElementById('createError');
            const loadingDiv = document.getElementById('createLoading');

            errorDiv.textContent = '';
            loadingDiv.textContent = '⏳ Проверка...';

            if (!roomName || !password) {
                errorDiv.textContent = 'Заполните все поля';
                loadingDiv.textContent = '';
                return;
            }

            if (roomName.length < 3) {
                errorDiv.textContent = 'Название минимум 3 символа';
                loadingDiv.textContent = '';
                return;
            }

            try {
                const userId = crypto.randomUUID();

                const { data: existing } = await supabase
                    .from('rooms')
                    .select('id')
                    .eq('id', roomName)
                    .maybeSingle();

                if (existing) {
                    errorDiv.textContent = '❌ Комната с таким названием уже существует';
                    loadingDiv.textContent = '';
                    return;
                }

                loadingDiv.textContent = '⏳ Создание комнаты...';

                const { error: roomError } = await supabase
                    .from('rooms')
                    .insert([{ 
                        id: roomName, 
                        password: password, 
                        admin_id: userId,
                        created_at: new Date().toISOString()
                    }]);

                if (roomError) throw roomError;

                loadingDiv.textContent = '⏳ Настройка админа...';

                await supabase
                    .from('waiting')
                    .insert([{ 
                        room_id: roomName, 
                        user_id: userId, 
                        status: 'approved' 
                    }]);

                loadingDiv.textContent = '✅ Перенаправление...';

                setTimeout(() => {
                    window.location.href = `admin.html?room=${encodeURIComponent(roomName)}&userId=${encodeURIComponent(userId)}`;
                }, 500);

            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Ошибка: ' + err.message;
                loadingDiv.textContent = '';
            }
        };

        document.getElementById('joinBtn').onclick = async () => {
            const roomName = document.getElementById('joinRoomName').value.trim();
            const password = document.getElementById('joinPassword').value;
            const errorDiv = document.getElementById('joinError');
            const loadingDiv = document.getElementById('joinLoading');

            errorDiv.textContent = '';
            loadingDiv.textContent = '⏳ Проверка...';

            if (!roomName || !password) {
                errorDiv.textContent = 'Заполните все поля';
                loadingDiv.textContent = '';
                return;
            }

            try {
                const { data: room, error: roomError } = await supabase
                    .from('rooms')
                    .select('*')
                    .eq('id', roomName)
                    .maybeSingle();

                if (roomError) throw roomError;

                if (!room) {
                    errorDiv.textContent = '❌ Комната не найдена';
                    loadingDiv.textContent = '';
                    return;
                }

                if (room.password !== password) {
                    errorDiv.textContent = '❌ Неверный пароль';
                    loadingDiv.textContent = '';
                    return;
                }

                loadingDiv.textContent = '⏳ Вход...';

                const userId = crypto.randomUUID();

                await supabase
                    .from('waiting')
                    .insert([{ 
                        room_id: roomName, 
                        user_id: userId, 
                        status: 'waiting',
                        created_at: new Date().toISOString()
                    }]);

                loadingDiv.textContent = '✅ Перенаправление...';

                setTimeout(() => {
                    window.location.href = `waiting.html?room=${encodeURIComponent(roomName)}&userId=${encodeURIComponent(userId)}`;
                }, 500);

            } catch (err) {
                console.error(err);
                errorDiv.textContent = 'Ошибка: ' + err.message;
                loadingDiv.textContent = '';
            }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const roomFromUrl = urlParams.get('room');
        if (roomFromUrl) {
            document.getElementById('joinRoomName').value = roomFromUrl;
            document.getElementById('showJoinBtn').click();
        }
    </script>
</body>
</html>
